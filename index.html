<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarah Selene Store</title>
    <style>
        /* --- CORE APPLICATION STYLES --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f5f7;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- LEFT CATALOG SIDE STYLES --- */
        .catalog-side {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #d1d5db;
            background-color: #ffffff;
        }

        .search-box-container {
            padding: 15px;
            background-color: #eaecef;
            border-bottom: 2px solid #d1d5db;
        }

        .search-bar {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #9ca3af;
            border-radius: 8px;
        }

        .grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* --- PRODUCT CARD STYLES (TEXT ONLY) --- */
        .product-card {
            width: calc(33.33% - 10px);
            min-height: 120px;
            background: #ffffff;
            border: 3px solid #bcbfc6;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            gap: 10px;
        }
        
        .product-card:active {
            background-color: #e5e7eb;
            transform: scale(0.98);
        }

        .product-card.unavailable {
            background-color: #e5e7eb;
            border: 3px dashed #9ca3af;
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .product-card.unavailable .product-title {
            text-decoration: line-through;
            color: #6b7280;
        }
        
        .product-card.unavailable .product-price {
            color: #6b7280;
        }

        .product-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
            color: #111827;
            word-break: break-word;
            text-align: center;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
            margin: 0;
            text-align: center;
        }

        /* --- RIGHT SIDE REGISTER/CART STYLES --- */
        .cart-side {
            width: 35%;
            height: 100%;
            background-color: #1f2937;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .cart-header {
            padding: 20px;
            background-color: #111827;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #374151;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .cart-item {
            background-color: #374151;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 5px solid #2563eb;
        }

        .cart-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Dynamic Custom Amount Input Styling */
        .others-price-input {
            width: 120px;
            height: 45px;
            font-size: 22px;
            font-weight: bold;
            text-align: right;
            background-color: #1f2937;
            color: #10b981;
            border: 2px solid #10b981;
            border-radius: 6px;
            padding: 4px;
        }

        .cart-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fraction-row {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
        }

        /* --- INTERACTIVE BUTTON & INPUT STYLES --- */
        .qty-btn {
            width: 55px;
            height: 55px;
            font-size: 28px;
            font-weight: bold;
            background-color: #4b5563;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .qty-btn.plus { background-color: #10b981; }
        .qty-btn.minus { background-color: #f59e0b; }
        
        .frac-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4b5563;
            color: #ffffff;
            border: 2px solid #6b7280;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .item-qty-input {
            width: 75px;
            height: 50px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background-color: #1f2937;
            color: #fca5a5;
            border: 2px solid #9ca3af;
            border-radius: 6px;
        }

        /* --- CART SUMMARY FOOTER STYLES --- */
        .cart-footer {
            background-color: #111827;
            padding: 20px;
            border-top: 3px solid #374151;
        }

        .total-row, .payment-row, .change-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .total-label, .payment-label, .change-label { font-size: 22px; font-weight: bold; }
        .total-amount { font-size: 34px; font-weight: 900; color: #10b981; }
        
        .payment-input {
            width: 160px;
            height: 45px;
            font-size: 26px;
            font-weight: bold;
            text-align: right;
            background-color: #1f2937;
            color: #ffffff;
            border: 2px solid #9ca3af;
            border-radius: 6px;
            padding-right: 8px;
        }

        .change-amount { font-size: 30px; font-weight: 900; color: #f59e0b; }

        .clear-all-btn {
            width: 100%;
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="catalog-side">
            <div class="search-box-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="🔍 TYPE TO SEARCH ITEMS..." oninput="filterProducts()">
            </div>
            <div class="grid-scroll">
                <div id="productsGrid" class="products-grid"></div>
            </div>
        </div>

        <div class="cart-side">
            <div class="cart-header">SHOPPING CART</div>
            <div id="cartItemsList" class="cart-items-list"></div>
            
            <div class="cart-footer">
                <div class="total-row">
                    <span class="total-label">TOTAL:</span>
                    <span id="totalDisplay" class="total-amount">₱0.00</span>
                </div>
                
                <div class="payment-row">
                    <span class="payment-label">PAYMENT:</span>
                    <input type="number" id="paymentInput" class="payment-input" placeholder="0.00" step="0.01" min="0" oninput="calculateChange()">
                </div>

                <div class="change-row">
                    <span class="change-label">CHANGE:</span>
                    <span id="changeDisplay" class="change-amount">₱0.00</span>
                </div>

                <button class="clear-all-btn" onclick="clearCart()">CLEAR ALL</button>
            </div>
        </div>

    </div>
