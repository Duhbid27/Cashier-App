<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarah Selene Store</title>
    <style>
        /* --- CORE APPLICATION STYLES --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f5f7;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- LEFT CATALOG SIDE STYLES --- */
        .catalog-side {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #d1d5db;
            background-color: #ffffff;
        }

        .search-box-container {
            padding: 15px;
            background-color: #eaecef;
            border-bottom: 2px solid #d1d5db;
        }

        .search-bar {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #9ca3af;
            border-radius: 8px;
        }

        .grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* --- PRODUCT CARD STYLES (TEXT ONLY) --- */
        .product-card {
            width: calc(33.33% - 10px);
            min-height: 120px;
            background: #ffffff;
            border: 3px solid #bcbfc6;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            gap: 10px;
        }
        
        .product-card:active {
            background-color: #e5e7eb;
            transform: scale(0.98);
        }

        .product-card.unavailable {
            background-color: #e5e7eb;
            border: 3px dashed #9ca3af;
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .product-card.unavailable .product-title {
            text-decoration: line-through;
            color: #6b7280;
        }
        
        .product-card.unavailable .product-price {
            color: #6b7280;
        }

        .product-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
            color: #111827;
            word-break: break-word;
            text-align: center;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
            margin: 0;
            text-align: center;
        }

        /* --- RIGHT SIDE REGISTER/CART STYLES --- */
        .cart-side {
            width: 35%;
            height: 100%;
            background-color: #1f2937;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .cart-header {
            padding: 20px;
            background-color: #111827;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #374151;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .cart-item {
            background-color: #374151;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 5px solid #2563eb;
        }

        .cart-item-meta {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
        }

        .cart-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fraction-row {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
        }

        /* --- INTERACTIVE BUTTON & INPUT STYLES --- */
        .qty-btn {
            width: 55px;
            height: 55px;
            font-size: 28px;
            font-weight: bold;
            background-color: #4b5563;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .qty-btn.plus { background-color: #10b981; }
        .qty-btn.minus { background-color: #f59e0b; }
        
        .frac-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4b5563;
            color: #ffffff;
            border: 2px solid #6b7280;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .frac-btn:active {
            background-color: #374151;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Large Typeable Numeric Input Box for Bad Eyesight */
        .item-qty-input {
            width: 75px;
            height: 50px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background-color: #1f2937;
            color: #fca5a5;
            border: 2px solid #9ca3af;
            border-radius: 6px;
        }

        /* --- CART SUMMARY FOOTER STYLES --- */
        .cart-footer {
            background-color: #111827;
            padding: 20px;
            border-top: 3px solid #374151;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .total-label { font-size: 24px; font-weight: bold; }
        .total-amount { font-size: 36px; font-weight: 900; color: #10b981; }

        .clear-all-btn {
            width: 100%;
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="catalog-side">
            <div class="search-box-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="🔍 TYPE TO SEARCH ITEMS..." oninput="filterProducts()">
            </div>
            <div class="grid-scroll">
                <div id="productsGrid" class="products-grid"></div>
            </div>
        </div>

        <div class="cart-side">
            <div class="cart-header">SHOPPING CART</div>
            <div id="cartItemsList" class="cart-items-list"></div>
            
            <div class="cart-footer">
                <div class="total-row">
                    <span class="total-label">TOTAL:</span>
                    <span id="totalDisplay" class="total-amount">0.00</span>
                </div>
                <button class="clear-all-btn" onclick="clearCart()">CLEAR ALL</button>
            </div>
        </div>

    </div>

    <script>
        // --- HARDCODED INVENTORY DATA SYSTEM ---
        var productsData = [
            { id: 1, name: "Bigas (50)", price: 50.00, available: true },
            { id: 2, name: "Bigas (55)", price: 55.00, available: true },
            { id: 3, name: "Mantika", price: 0.00, available: false },
            { id: 4, name: "Itlog", price: 10.00, available: true },
            { id: 5, name: "Candy", price: 2.00, available: true }, // Added Candy with standard individual pricing display
            { id: 6, name: "Coke (1.5)", price: 0.00, available: true },
            { id: 7, name: "Coke (Kasalo)", price: 0.00, available: true },
            { id: 8, name: "Coke (Mismo)", price: 0.00, available: true },
            { id: 9, name: "Coke (8oz)", price: 14.00, available: true },
            { id: 10, name: "Royal (1.5)", price: 0.00, available: true },
            { id: 11, name: "Royal (Kasalo)", price: 0.00, available: true },
            { id: 12, name: "Royal (Mismo)", price: 0.00, available: true },
            { id: 13, name: "Royal (8oz)", price: 14.00, available: true },
            { id: 14, name: "Sprite (1.5)", price: 0.00, available: true },
            { id: 15, name: "Sprite (Kasalo)", price: 0.00, available: true },
            { id: 16, name: "Sprite (Mismo)", price: 0.00, available: true },
            { id: 17, name: "Sprite (8oz)", price: 14.00, available: true },
            { id: 18, name: "Mt. Dew (Kasalo)", price: 0.00, available: true },
            { id: 19, name: "Mt. Dew (12oz)", price: 18.00, available: true },
            { id: 20, name: "Mt. Dew (8oz)", price: 0.00, available: false },
            { id: 21, name: "Dutchmill (Small)", price: 0.00, available: true },
            { id: 22, name: "Dutchmill (Big)", price: 0.00, available: true },
            { id: 23, name: "Chuckie (Small)", price: 0.00, available: true },
            { id: 24, name: "Chuckie (Big)", price: 0.00, available: true },
            { id: 25, name: "Yakult", price: 0.00, available: true },
            { id: 26, name: "Cobra", price: 0.00, available: false },
            { id: 27, name: "Sting", price: 0.00, available: false },
            { id: 28, name: "Sterilized", price: 0.00, available: false },
            { id: 29, name: "Pineapple Juice", price: 0.00, available: false },
            { id: 30, name: "Water (500ml)", price: 0.00, available: false },
            { id: 31, name: "Water (750ml)", price: 0.00, available: false },
            { id: 32, name: "RedHorse (500ml)", price: 0.00, available: false },
            { id: 33, name: "RedHorse (1L)", price: 0.00, available: false },
            { id: 34, name: "Pale Pilsen", price: 0.00, available: false },
            { id: 35, name: "Pale Pilsen (1L)", price: 0.00, available: false },
            { id: 36, name: "San Miguel (Lights)", price: 0.00, available: false },
            { id: 37, name: "San Miguel (Apple)", price: 0.00, available: false },
            { id: 38, name: "Rebisco (Cracker)", price: 0.00, available: false },
            { id: 39, name: "Rebisco (Choco)", price: 0.00, available: false },
            { id: 40, name: "Rebisco (Strawberry)", price: 0.00, available: false },
            { id: 41, name: "Skyflakes", price: 0.00, available: false },
            { id: 42, name: "Hansel (Cracker)", price: 0.00, available: false },
            { id: 43, name: "Hansel (Choco)", price: 0.00, available: false },
            { id: 44, name: "Hansel (Mocha)", price: 0.00, available: false },
            { id: 45, name: "Buttercream", price: 0.00, available: false },
            { id: 46, name: "Fita", price: 0.00, available: false },
            { id: 47, name: "Overload", price: 0.00, available: false },
            { id: 48, name: "WhattaTops", price: 0.00, available: false },
            { id: 49, name: "FudgeeBar", price: 0.00, available: false },
            { id: 50, name: "Marlboro", price: 0.00, available: false },
            { id: 51, name: "Fortune", price: 0.00, available: false },
        ];

        var cart = [];

        // Render inventory menu items grid (Text only, clean sizing)
        function renderCatalog(items) {
            var grid = document.getElementById("productsGrid");
            grid.innerHTML = "";
            
            for (var i = 0; i < items.length; i++) {
                var p = items[i];
                var card = document.createElement("div");
                
                if (p.available) {
                    card.className = "product-card";
                    card.setAttribute("onclick", "addToCart(" + p.id + ")");
                } else {
                    card.className = "product-card unavailable";
                }
                
                // Show standard pricing note if it's candy
                var priceText = '₱' + p.price.toFixed(2);
                if (p.name.toLowerCase().indexOf("candy") !== -1) {
                    priceText = "₱2.00 (4 for ₱5)";
                }

                card.innerHTML = 
                    '<div class="product-title">' + p.name + '</div>' +
                    '<div class="product-price">' + (p.available ? priceText : 'OUT OF STOCK') + '</div>';
                
                grid.appendChild(card);
            }
        }

        // Live text filter execution loop
        function filterProducts() {
            var query = document.getElementById("searchBar").value.toLowerCase();
            var filtered = [];
            for (var i = 0; i < productsData.length; i++) {
                if (productsData[i].name.toLowerCase().indexOf(query) !== -1) {
                    filtered.push(productsData[i]);
                }
            }
            renderCatalog(filtered);
        }

        // Custom Pricing Engine for dynamic item conditions
        function calculateItemCost(item) {
            if (item.name.toLowerCase().indexOf("candy") !== -1) {
                // Bulk Pricing: 4 pcs for 5 pesos, rest are 2 pesos each
                var bundlesOfFour = Math.floor(item.qty / 4);
                var remainder = item.qty % 4;
                return (bundlesOfFour * 5.00) + (remainder * 2.00);
            }
            return item.price * item.qty;
        }

        // Add element to transactional storage array
        function addToCart(id) {
            var found = false;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].qty = parseFloat((cart[i].qty + 1).toFixed(2));
                    found = true;
                    break;
                }
            }
            if (!found) {
                var product = null;
                for (var j = 0; j < productsData.length; j++) {
                    if (productsData[j].id === id) {
                        product = productsData[j];
                        break;
                    }
                }
                if (product) {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        qty: 1.00
                    });
                }
            }
            updateCartUI();
        }

        // Adjust entry volumes via +/- buttons safely
        function changeQty(id, delta) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].qty = parseFloat((cart[i].qty + delta).toFixed(2));
                    if (cart[i].qty <= 0) {
                        cart.splice(i, 1);
                    }
                    break;
                }
            }
            updateCartUI();
        }

        // Direct typed input handler
        function updateTypedQty(id, inputElement) {
            var value = parseFloat(inputElement.value);
            if (isNaN(value) || value <= 0) {
                value = 1;
            }
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].qty = parseFloat(value.toFixed(2));
                    break;
                }
            }
            updateCartUI();
        }

        // Explicit single item array truncation
        function removeLineItem(id) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart.splice(i, 1);
                    break;
                }
            }
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        // Primary UI processing cycle
        function updateCartUI() {
            var listContainer = document.getElementById("cartItemsList");
            listContainer.innerHTML = "";
            var runningTotal = 0;

            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var itemCost = calculateItemCost(item); // Uses custom dynamic price calculation rules
                runningTotal += itemCost;

                var itemNameLower = item.name.toLowerCase();
                var isRice = itemNameLower.indexOf("bigas") !== -1;
                var isOil = itemNameLower.indexOf("mantika") !== -1;
                
                var stepVal = (isRice || isOil) ? "0.01" : "1";

                var row = document.createElement("div");
                row.className = "cart-item";
                
                var innerHTMLString = 
                    '<div class="cart-item-meta">' +
                        '<span>' + item.name + '</span>' +
                        '<span>₱' + itemCost.toFixed(2) + '</span>' +
                    '</div>' +
                    '<div class="cart-controls">' +
                        '<div class="control-row-main">' +
                            '<button class="qty-btn minus" onclick="changeQty(' + item.id + ', -1)">-1</button>' +
                            '<input type="number" step="' + stepVal + '" class="item-qty-input" value="' + item.qty + '" onchange="updateTypedQty(' + item.id + ', this)">' +
                            '<button class="qty-btn plus" onclick="changeQty(' + item.id + ', 1)">+1</button>' +
                            '<button class="delete-btn" onclick="removeLineItem(' + item.id + ')">REMOVE</button>' +
                        '</div>';
                
                if (isRice) {
                    innerHTMLString += 
                        '<div class="fraction-row">' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.25)">+0.25</button>' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.33)">+0.33</button>' +
                        '</div>';
                }
                
                if (isOil) {
                    innerHTMLString += 
                        '<div class="fraction-row">' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.50)">+0.50</button>' +
                        '</div>';
                }

                innerHTMLString += '</div>';
                row.innerHTML = innerHTMLString;
                listContainer.appendChild(row);
            }

            document.getElementById("totalDisplay").innerText = "₱" + runningTotal.toFixed(2);
        }

        window.onload = function() {
            renderCatalog(productsData);
        };
    </script>
</body>
</html>
