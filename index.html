<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarah Selene Store</title>
    <style>
        /* --- CORE APPLICATION STYLES --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f5f7;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- LEFT CATALOG SIDE STYLES --- */
        .catalog-side {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #d1d5db;
            background-color: #ffffff;
        }

        .search-box-container {
            padding: 15px;
            background-color: #eaecef;
            border-bottom: 2px solid #d1d5db;
        }

        .search-bar {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #9ca3af;
            border-radius: 8px;
        }

        .grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* --- PRODUCT CARD STYLES (TEXT ONLY) --- */
        .product-card {
            width: calc(33.33% - 10px);
            min-height: 120px;
            background: #ffffff;
            border: 3px solid #bcbfc6;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            gap: 10px;
        }
        
        .product-card:active {
            background-color: #e5e7eb;
            transform: scale(0.98);
        }

        .product-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
            color: #111827;
            word-break: break-word;
            text-align: center;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
            margin: 0;
            text-align: center;
        }

        /* --- RIGHT SIDE REGISTER/CART STYLES --- */
        .cart-side {
            width: 35%;
            height: 100%;
            background-color: #1f2937;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .cart-header {
            padding: 20px;
            background-color: #111827;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #374151;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .cart-item {
            background-color: #374151;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 5px solid #2563eb;
        }

        .cart-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Dynamic Custom Amount Input Styling */
        .others-price-input {
            width: 120px;
            height: 45px;
            font-size: 22px;
            font-weight: bold;
            text-align: right;
            background-color: #1f2937;
            color: #10b981;
            border: 2px solid #10b981;
            border-radius: 6px;
            padding: 4px;
        }

        .cart-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fraction-row {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
        }

        /* --- INTERACTIVE BUTTON & INPUT STYLES --- */
        .qty-btn {
            width: 55px;
            height: 55px;
            font-size: 28px;
            font-weight: bold;
            background-color: #4b5563;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .qty-btn.plus { background-color: #10b981; }
        .qty-btn.minus { background-color: #f59e0b; }
        
        .frac-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4b5563;
            color: #ffffff;
            border: 2px solid #6b7280;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .item-qty-input {
            width: 75px;
            height: 50px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background-color: #1f2937;
            color: #fca5a5;
            border: 2px solid #9ca3af;
            border-radius: 6px;
        }

        /* --- CART SUMMARY FOOTER STYLES --- */
        .cart-footer {
            background-color: #111827;
            padding: 20px;
            border-top: 3px solid #374151;
        }

        .total-row, .payment-row, .change-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .total-label, .payment-label, .change-label { font-size: 22px; font-weight: bold; }
        .total-amount { font-size: 34px; font-weight: 900; color: #10b981; }
        
        .payment-input {
            width: 160px;
            height: 45px;
            font-size: 26px;
            font-weight: bold;
            text-align: right;
            background-color: #1f2937;
            color: #ffffff;
            border: 2px solid #9ca3af;
            border-radius: 6px;
            padding-right: 8px;
        }

        .change-amount { font-size: 30px; font-weight: 900; color: #f59e0b; }

        .clear-all-btn {
            width: 100%;
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>

        var cart = [];
        var globalTotal = 0;

        function renderCatalog(items) {
            var grid = document.getElementById("productsGrid");
            grid.innerHTML = "";
            
            for (var i = 0; i < items.length; i++) {
                var p = items[i];
                var card = document.createElement("div");
                card.className = "product-card";
                card.setAttribute("onclick", "addToCart(" + p.id + ")");
                
                var priceText = '₱' + p.price.toFixed(2);
                if (p.name.toLowerCase().indexOf("candy") !== -1) {
                    priceText = "₱2.00 (4 for ₱5)";
                } else if (p.name.toLowerCase() === "others") {
                    priceText = "₱ Manual";
                }

                card.innerHTML = 
                    '<div class="product-title">' + p.name + '</div>' +
                    '<div class="product-price">' + priceText + '</div>';
                
                grid.appendChild(card);
            }
        }

        function filterProducts() {
            var query = document.getElementById("searchBar").value.toLowerCase();
            var filtered = [];
            for (var i = 0; i < productsData.length; i++) {
                if (productsData[i].name.toLowerCase().indexOf(query) !== -1) {
                    filtered.push(productsData[i]);
                }
            }
            renderCatalog(filtered);
        }

        function calculateItemCost(item) {
            if (item.name.toLowerCase().indexOf("candy") !== -1) {
                var bundlesOfFour = Math.floor(item.qty / 4);
                var remainder = item.qty % 4;
                return (bundlesOfFour * 5.00) + (remainder * 2.00);
            }
            return item.price * item.qty;
        }

        function addToCart(id) {
            var product = null;
            for (var j = 0; j < productsData.length; j++) {
                if (productsData[j].id === id) {
                    product = productsData[j];
                    break;
                }
            }

            if (!product) return;

            // If it is "Others", skip search check and always force push a separate distinct card line
            if (product.name.toLowerCase() === "others") {
                cart.push({
                    cartItemId: Date.now() + Math.random(), // Unique tracking ID for multiple "Others"
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    qty: 1.00
                });
            } else {
                // Regular calculation loop checks for generic duplicated item stacking
                var found = false;
                for (var i = 0; i < cart.length; i++) {
                    if (cart[i].id === id) {
                        cart[i].qty = parseFloat((cart[i].qty + 1).toFixed(2));
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    cart.push({
                        cartItemId: product.id, // Regular entries just map straight to product ID
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        qty: 1.00
                    });
                }
            }
            updateCartUI();
        }

        function changeQty(cartItemId, delta) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].cartItemId === cartItemId) {
                    cart[i].qty = parseFloat((cart[i].qty + delta).toFixed(2));
                    if (cart[i].qty <= 0) {
                        cart.splice(i, 1);
                    }
                    break;
                }
            }
            updateCartUI();
        }

        function updateTypedQty(cartItemId, inputElement) {
            var value = parseFloat(inputElement.value);
            if (isNaN(value) || value <= 0) {
                value = 1;
            }
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].cartItemId === cartItemId) {
                    cart[i].qty = parseFloat(value.toFixed(2));
                    break;
                }
            }
            updateCartUI();
        }

        function updateOthersPrice(cartItemId, inputElement) {
            var value = parseFloat(inputElement.value);
            if (isNaN(value) || value < 0) {
                value = 0;
            }
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].cartItemId === cartItemId) {
                    cart[i].price = value;
                    break;
                }
            }
            updateCartUI();
        }

        function removeLineItem(cartItemId) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].cartItemId === cartItemId) {
                    cart.splice(i, 1);
                    break;
                }
            }
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            document.getElementById("paymentInput").value = "";
            updateCartUI();
        }

        function calculateChange() {
            var paymentInput = document.getElementById("paymentInput").value;
            var payment = parseFloat(paymentInput);
            var changeDisplay = document.getElementById("changeDisplay");
            
            if (isNaN(payment) || paymentInput === "") {
                changeDisplay.innerText = "₱0.00";
                return;
            }

            var change = payment - globalTotal;
            changeDisplay.innerText = "₱" + (change >= 0 ? change.toFixed(2) : "0.00 (Short)");
        }

        function updateCartUI() {
            var listContainer = document.getElementById("cartItemsList");
            listContainer.innerHTML = "";
            globalTotal = 0;

            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var itemCost = calculateItemCost(item);
                globalTotal += itemCost;

                var itemNameLower = item.name.toLowerCase();
                var isRice = itemNameLower.indexOf("bigas") !== -1;
                var isOil = itemNameLower.indexOf("mantika") !== -1;
                var isOthers = itemNameLower === "others";
                
                var stepVal = (isRice || isOil) ? "0.01" : "1";

                var row = document.createElement("div");
                row.className = "cart-item";
                
                var priceDisplayElement = '<span>₱' + itemCost.toFixed(2) + '</span>';
                if (isOthers) {
                    priceDisplayElement = '<div>₱ <input type="number" class="others-price-input" value="' + (item.price === 0 ? '' : item.price) + '" placeholder="0.00" step="0.5" onchange="updateOthersPrice(' + item.cartItemId + ', this)"></div>';
                }

                var innerHTMLString = 
                    '<div class="cart-item-meta">' +
                        '<span>' + item.name + '</span>' +
                        priceDisplayElement +
                    '</div>' +
                    '<div class="cart-controls">' +
                        '<div class="control-row-main">' +
                            '<button class="qty-btn minus" onclick="changeQty(' + item.cartItemId + ', -1)">-1</button>' +
                            '<input type="number" step="' + stepVal + '" class="item-qty-input" value="' + item.qty + '" onchange="updateTypedQty(' + item.cartItemId + ', this)">' +
                            '<button class="qty-btn plus" onclick="changeQty(' + item.cartItemId + ', 1)">+1</button>' +
                            '<button class="delete-btn" onclick="removeLineItem(' + item.cartItemId + ')">REMOVE</button>' +
                        '</div>';
                
                if (isRice) {
                    innerHTMLString += 
                        '<div class="fraction-row">' +
                            '<button class="frac-btn" onclick="changeQty(' + item.cartItemId + ', 0.25)">+0.25</button>' +
                            '<button class="frac-btn" onclick="changeQty(' + item.cartItemId + ', 0.33)">+0.33</button>' +
                        '</div>';
                }
                
                if (isOil) {
                    innerHTMLString += 
                        '<div class="fraction-row">' +
                            '<button class="frac-btn" onclick="changeQty(' + item.cartItemId + ', 0.50)">+0.50</button>' +
                        '</div>';
                }

                innerHTMLString += '</div>';
                row.innerHTML = innerHTMLString;
                listContainer.appendChild(row);
            }

            document.getElementById("totalDisplay").innerText = "₱" + globalTotal.toFixed(2);
            calculateChange();
        }

        window.onload = function() {
            renderCatalog(productsData);
        };
    </script>
</body>
</html>
