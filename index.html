<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarah Selene Store</title>
    <style>
        /* CSS Reset & Variable Fallbacks for old Safari */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f5f7;
            overflow: hidden;
        }

        /* Force landscape layout container splitting Screen 65/35 */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* LEFT SIDE: Product Catalogue Search + Grid */
        .catalog-side {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #d1d5db;
            background-color: #ffffff;
        }

        .search-box-container {
            padding: 15px;
            background-color: #eaecef;
            border-bottom: 2px solid #d1d5db;
        }

        /* Massive Search input for bad eyesight */
        .search-bar {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #9ca3af;
            border-radius: 8px;
        }

        .grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch; /* Smooth iOS momentum scroll */
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Massive Text-Only Item Buttons */
        .product-card {
            width: calc(33.33% - 10px);
            min-height: 120px;
            background: #ffffff;
            border: 3px solid #bcbfc6;
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .product-card:active {
            background-color: #e5e7eb;
            transform: scale(0.98);
        }

        .product-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #111827;
            word-break: break-word;
        }

        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
            margin: 0;
        }

        /* RIGHT SIDE: Cart Processing Panel */
        .cart-side {
            width: 35%;
            height: 100%;
            background-color: #1f2937;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .cart-header {
            padding: 20px;
            background-color: #111827;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #374151;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* Row item details inside cart */
        .cart-item {
            background-color: #374151;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 5px solid #2563eb;
        }

        .cart-item-meta {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
        }

        .cart-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Top row controls: Basic adjustments */
        .control-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Bottom row controls: Quick fractional selectors */
        .fraction-row {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
        }

        /* Gigantic action buttons for basic adjustments */
        .qty-btn {
            width: 55px;
            height: 55px;
            font-size: 28px;
            font-weight: bold;
            background-color: #4b5563;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .qty-btn.plus { background-color: #10b981; }
        .qty-btn.minus { background-color: #f59e0b; }
        
        /* Specialized fractional increment buttons */
        .frac-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4b5563;
            color: #ffffff;
            border: 2px solid #6b7280;
            border-radius: 6px;
            cursor: pointer;
        }
        .frac-btn:active {
            background-color: #374151;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .item-qty-display {
            font-size: 26px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
            color: #fca5a5;
        }

        /* Sticky Footer Total Counter */
        .cart-footer {
            background-color: #111827;
            padding: 20px;
            border-top: 3px solid #374151;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .total-label { font-size: 24px; font-weight: bold; }
        .total-amount { font-size: 36px; font-weight: 900; color: #10b981; }

        .clear-all-btn {
            width: 100%;
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">LOADING ITEMS FROM GOOGLE SHEETS...</div>

    <div class="app-container">
        
        <div class="catalog-side">
            <div class="search-box-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="🔍 TYPE TO SEARCH ITEMS..." oninput="filterProducts()">
            </div>
            <div class="grid-scroll">
                <div id="productsGrid" class="products-grid"></div>
            </div>
        </div>

        <div class="cart-side">
            <div class="cart-header">SHOPPING CART</div>
            <div id="cartItemsList" class="cart-items-list"></div>
            
            <div class="cart-footer">
                <div class="total-row">
                    <span class="total-label">TOTAL:</span>
                    <span id="totalDisplay" class="total-amount">0.00</span>
                </div>
                <button class="clear-all-btn" onclick="clearCart()">CLEAR ALL</button>
            </div>
        </div>

    </div>

    <script>
        // Your specific Google Sheets raw CSV output link
        var csvUrl = "https://docs.google.com/spreadsheets/d/1hpSrGh5l0b2jwqv8isdI5ivFq1N1SgWt1jHm-_nAazE/export?format=csv";
        
        var productsData = [];
        var cart = [];

        // Fetch CSV data from Google Sheets safely supporting older browsers (ES5/XMLHttpRequest)
        function loadInventoryFromSheets() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", csvUrl, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        parseCSV(xhr.responseText);
                    } else {
                        alert("Failed to load inventory from Google Sheets. Ensure your sheet is shared as 'Anyone with the link can view'.");
                        document.getElementById("loadingOverlay").style.display = "none";
                    }
                }
            };
            xhr.send();
        }

        // Custom ES5 native CSV parser loop to keep iOS 9 compatibility solid
        function parseCSV(csvText) {
            var lines = csvText.split(/\r\n|\n/);
            var parsedProducts = [];
            
            // Loop starts at 1 to skip header row (id, name, price)
            for (var i = 1; i < lines.length; i++) {
                if (lines[i].trim() === "") continue;
                
                var columns = lines[i].split(",");
                if (columns.length >= 3) {
                    parsedProducts.push({
                        id: parseInt(columns[0].trim(), 10),
                        name: columns[1].trim(),
                        price: parseFloat(columns[2].trim())
                    });
                }
            }
            
            productsData = parsedProducts;
            renderCatalog(productsData);
            document.getElementById("loadingOverlay").style.display = "none";
        }

        // Render standard inventory display cards (No Image Version)
        function renderCatalog(items) {
            var grid = document.getElementById("productsGrid");
            grid.innerHTML = "";
            
            for (var i = 0; i < items.length; i++) {
                var p = items[i];
                var card = document.createElement("div");
                card.className = "product-card";
                card.setAttribute("onclick", "addToCart(" + p.id + ")");
                
                card.innerHTML = 
                    '<div class="product-title">' + p.name + '</div>' +
                    '<div class="product-price">₱' + p.price.toFixed(2) + '</div>';
                
                grid.appendChild(card);
            }
        }

        // Live text filter execution loop
        function filterProducts() {
            var query = document.getElementById("searchBar").value.toLowerCase();
            var filtered = [];
            for (var i = 0; i < productsData.length; i++) {
                if (productsData[i].name.toLowerCase().indexOf(query) !== -1) {
                    filtered.push(productsData[i]);
                }
            }
            renderCatalog(filtered);
        }

        // Add element to transactional storage array
        function addToCart(id) {
            var found = false;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].qty = parseFloat((cart[i].qty + 1).toFixed(2));
                    found = true;
                    break;
                }
            }
            if (!found) {
                var product = null;
                for (var j = 0; j < productsData.length; j++) {
                    if (productsData[j].id === id) {
                        product = productsData[j];
                        break;
                    }
                }
                if (product) {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        qty: 1.00
                    });
                }
            }
            updateCartUI();
        }

        // Adjust entry volumes up or down safely controlling fractional bounds
        function changeQty(id, delta) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].qty = parseFloat((cart[i].qty + delta).toFixed(2));
                    if (cart[i].qty <= 0) {
                        cart.splice(i, 1);
                    }
                    break;
                }
            }
            updateCartUI();
        }

        // Explicit single item array truncation
        function removeLineItem(id) {
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart.splice(i, 1);
                    break;
                }
            }
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        // Primary UI processing cycle
        function updateCartUI() {
            var listContainer = document.getElementById("cartItemsList");
            listContainer.innerHTML = "";
            var runningTotal = 0;

            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var itemCost = item.price * item.qty;
                runningTotal += itemCost;

                var row = document.createElement("div");
                row.className = "cart-item";
                row.innerHTML = 
                    '<div class="cart-item-meta">' +
                        '<span>' + item.name + '</span>' +
                        '<span>₱' + itemCost.toFixed(2) + '</span>' +
                    '</div>' +
                    '<div class="cart-controls">' +
                        '<div class="control-row-main">' +
                            '<button class="qty-btn minus" onclick="changeQty(' + item.id + ', -1)">-1</button>' +
                            '<span class="item-qty-display">' + item.qty.toFixed(2) + '</span>' +
                            '<button class="qty-btn plus" onclick="changeQty(' + item.id + ', 1)">+1</button>' +
                            '<button class="delete-btn" onclick="removeLineItem(' + item.id + ')">REMOVE</button>' +
                        '</div>' +
                        '<div class="fraction-row">' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.25)">+0.25</button>' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.33)">+0.33</button>' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.50)">+0.50</button>' +
                            '<button class="frac-btn" onclick="changeQty(' + item.id + ', 0.75)">+0.75</button>' +
                        '</div>' +
                    '</div>';
                
                listContainer.appendChild(row);
            }

            document.getElementById("totalDisplay").innerText = "₱" + runningTotal.toFixed(2);
        }

        // Application initialization sequence
        window.onload = function() {
            loadInventoryFromSheets();
        };
    </script>
</body>
</html>
